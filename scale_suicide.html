<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scale Suicide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070707;color:#c8c8c8;font-family:'Barlow Condensed','Arial Narrow',sans-serif;min-height:100vh;padding:14px}
#app{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:8px}

/* panels */
.panel{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:6px;padding:13px 17px}
.ptitle{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.14em}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* header */
#hdr{text-align:center;padding:6px 0 2px;border-bottom:1px solid #141414}
#hdr span{font-size:13px;color:#333;letter-spacing:.32em;text-transform:uppercase}

/* stopwatch */
#sw{font-family:'Share Tech Mono',monospace;font-size:56px;font-weight:400;text-align:center;letter-spacing:.06em;color:#3a3a3a;transition:color .3s}
#sw.run{color:#00cc33;text-shadow:0 0 30px rgba(0,204,51,.2)}
#sw.pau{color:#cc7700}
#sw-st{text-align:center;font-size:11px;color:#333;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}

/* note display */
#note-wrap{background:#090800;border:2px solid #1e1e1e;border-radius:5px;padding:6px 12px;text-align:center;min-width:92px;flex-shrink:0;transition:border-color .3s}
#note-wrap.act{border-color:#cc6600}
#note{font-family:'Share Tech Mono',monospace;font-size:48px;font-weight:400;line-height:1;color:#333;transition:color .3s}
#note.act{color:#cc7700}
@keyframes noteFlash{from{opacity:.3;transform:scale(1.08)}to{opacity:1;transform:scale(1)}}
#note.flash{animation:noteFlash .22s ease-out}
#note-sc{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.08em;margin-top:3px}

/* progress */
#prog-wrap{background:#080808;border:1px solid #1e1e1e;border-radius:5px;padding:7px 15px;text-align:center;min-width:74px;flex-shrink:0;transition:border-color .3s}
#prog-wrap.done{border-color:#006622}
#prog{font-family:'Share Tech Mono',monospace;font-size:22px;color:#333;transition:color .3s;line-height:1.1}
#prog.act{color:#c0c0c0}#prog.done{color:#00cc33}

/* sliders */
.srow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.slbl{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.08em;width:88px;text-align:right;flex-shrink:0}
.srow input[type=range]{flex:1;-webkit-appearance:none;appearance:none;background:transparent;outline:none;cursor:pointer}
.srow input[type=range]::-webkit-slider-runnable-track{background:#181818;height:3px;border-radius:2px}
.srow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:#00cc33;border-radius:50%;margin-top:-5px;box-shadow:0 0 5px rgba(0,204,51,.4)}
.srow input[type=range]::-moz-range-track{background:#181818;height:3px;border-radius:2px}
.srow input[type=range]::-moz-range-thumb{width:13px;height:13px;background:#00cc33;border-radius:50%;border:none}
.srow input[type=number]{width:60px;background:#080808;border:1px solid #1e1e1e;color:#cc7700;font-family:'Share Tech Mono',monospace;font-size:13px;padding:4px 5px;border-radius:3px;text-align:center;outline:none;-moz-appearance:textfield}
.srow input[type=number]::-webkit-outer-spin-button,.srow input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.sunit{font-size:10px;color:#444;width:28px;flex-shrink:0}

/* beat buttons */
#beat-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:11px}
.bbt{width:54px;height:54px;border-radius:5px;border:1px solid #1e1e1e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;background:#080808;transition:background .07s,border-color .07s;font-family:'Share Tech Mono',monospace}
.bbt[data-s=normal]{border-color:#1a4a22}
.bbt[data-s=accent]{border-color:#804400;background:#130a00}
.bbt[data-s=silent]{border-color:#141414;opacity:.4}
.bbt[data-a=1]{background:#003310;border-color:#00cc33;border-width:2px}
.bbn{font-size:14px;color:#c0c0c0}
.bbs{font-size:10px;color:#444}
.bbt[data-s=accent] .bbs{color:#cc7700}
.bbt[data-s=silent] .bbn,.bbt[data-s=silent] .bbs{color:#2a2a2a}
.bbt[data-a=1] .bbn,.bbt[data-a=1] .bbs{color:#00cc33}

/* live bpm */
#bpm-disp{font-family:'Share Tech Mono',monospace;font-size:30px;color:#cc7700;line-height:1}
#bpm-disp.run{color:#00cc33}

/* mode toggle */
.mbt{font-size:12px;letter-spacing:.06em;padding:5px 14px;border-radius:3px;cursor:pointer;border:1px solid #252525;background:#0a0a0a;color:#555;transition:all .18s;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:600;text-transform:uppercase}
.mbt.on{border-color:#005a8a;background:#001a28;color:#2299cc}

/* ramp box */
#ctrl-r{background:#0a0a0a;border-radius:4px;padding:10px;margin-bottom:8px}

/* select */
select{background:#080808;border:1px solid #1e1e1e;color:#c0c0c0;padding:8px 10px;border-radius:3px;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:14px;cursor:pointer;outline:none;flex:1;min-width:130px}
select option{background:#0e0e0e}

/* control buttons */
.cb{padding:10px 18px;border-radius:4px;cursor:pointer;border:1px solid #252525;background:#0a0a0a;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;transition:all .18s;min-width:110px}
.cb:disabled{opacity:.3;cursor:not-allowed}
.cb.suc{border-color:#1a4a22;color:#00cc33}
.cb.suc:not(:disabled):hover{background:#0a1f0d}
.cb.dan{border-color:#4a1a1a;color:#cc3333}
.cb.dan:not(:disabled):hover{background:#1f0a0a}
.cb.war{border-color:#4a3300;color:#cc7700}
.cb.war:not(:disabled):hover{background:#1f1400}
.cb.neu{border-color:#252525;color:#555}
.cb.neu:not(:disabled):hover{background:#111}
.cb.lit{background:#0a1f0d}

/* rating buttons */
.rbt{padding:9px 20px;border-radius:4px;cursor:pointer;border:2px solid #1e1e1e;background:#080808;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:700;font-size:14px;transition:all .18s;min-width:118px}
.rbt.g.on{border-color:#007733;background:#001a0a;color:#00cc33}
.rbt.o.on{border-color:#884400;background:#1a0d00;color:#cc7700}
.rbt.r.on{border-color:#881111;background:#1a0505;color:#cc3333}
.rbt:not(.on){color:#3a3a3a}
.rbt:hover{border-color:#333}

/* status */
#msg{padding:10px 16px;border-radius:5px;font-size:13px;line-height:1.55;display:none;font-family:'Barlow Condensed','Arial Narrow',sans-serif}
#msg.show{display:block}
#msg.w{background:#1a0a00;border:1px solid #884400;color:#cc7700}
#msg.s{background:#001a0a;border:1px solid #006622;color:#00cc33}
#msg.i{background:#0a0a0a;border:1px solid #222;color:#666}

/* acc buttons */
.acb{padding:5px 10px;border-radius:3px;border:1px solid #1e1e1e;background:#080808;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:16px;transition:all .18s;color:#444;min-width:36px;text-align:center}
.acb.on{border-color:#1a4a22;color:#00cc33;background:#0a1a0d}
</style>
</head>
<body>
<div id="app">

  <div id="hdr"><span>◆ Scale Suicide ◆</span></div>

  <div class="panel" style="text-align:center;padding:14px 0 10px">
    <div id="sw">00:00.00</div>
    <div id="sw-st">ready</div>
  </div>

  <div class="panel row">
    <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
      <span class="ptitle" style="font-size:10px;margin-right:3px">Alt:</span>
      <button id="ba-sh" class="acb on" onclick="setAcc('sharp')">#</button>
      <button id="ba-fl" class="acb"    onclick="setAcc('flat')">b</button>
    </div>
    <div id="note-wrap">
      <div id="note">—</div>
      <div id="note-sc">Major</div>
    </div>
    <select id="sc-sel" onchange="scaleType=this.value;$('note-sc').textContent=scaleType"></select>
    <div id="prog-wrap">
      <div id="prog">0/12</div>
      <div style="font-size:10px;color:#333;text-transform:uppercase;letter-spacing:.1em">progress</div>
    </div>
  </div>

  <div class="panel">
    <div class="row" style="margin-bottom:10px;gap:7px">
      <span class="ptitle">Metronome</span>
      <div style="display:flex;align-items:baseline;gap:6px;margin-left:6px">
        <div id="bpm-disp">120</div>
        <div>
          <div style="font-size:10px;color:#444">BPM</div>
          <div id="tempo-nm" style="font-size:10px;color:#444;font-style:italic">Allegro</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-left:auto">
        <button id="mb-st" class="mbt on" onclick="setMetMode('static')">Static</button>
        <button id="mb-rp" class="mbt"    onclick="setMetMode('ramp')">Ramp</button>
      </div>
    </div>

    <div id="ctrl-s">
      <div class="srow">
        <span class="slbl">BPM</span>
        <input type="range" id="sl-sb" min="20" max="280" value="120"
          oninput="sBpm=+this.value;$('num-sb').value=sBpm;if(metMode==='static'){liveBpm=sBpm;updBpm()}">
        <input type="number" id="num-sb" min="20" max="280" value="120"
          oninput="sBpm=clamp(+this.value,20,280);$('sl-sb').value=sBpm;if(metMode==='static'){liveBpm=sBpm;updBpm()}">
        <span class="sunit">bpm</span>
      </div>
    </div>

    <div id="ctrl-r" style="display:none">
      <div class="srow">
        <span class="slbl">Start BPM</span>
        <input type="range" id="sl-rs" min="20" max="280" value="60"
          oninput="rStart=+this.value;$('num-rs').value=rStart">
        <input type="number" id="num-rs" min="20" max="280" value="60"
          oninput="rStart=clamp(+this.value,20,280);$('sl-rs').value=rStart">
        <span class="sunit">bpm</span>
      </div>
      <div class="srow">
        <span class="slbl">End BPM</span>
        <input type="range" id="sl-re" min="20" max="280" value="160"
          oninput="rEnd=+this.value;$('num-re').value=rEnd">
        <input type="number" id="num-re" min="20" max="280" value="160"
          oninput="rEnd=clamp(+this.value,20,280);$('sl-re').value=rEnd">
        <span class="sunit">bpm</span>
      </div>
      <div class="srow">
        <span class="slbl">Increment</span>
        <input type="range" id="sl-ri" min="1" max="30" value="5"
          oninput="rStep=+this.value;$('num-ri').value=rStep">
        <input type="number" id="num-ri" min="1" max="30" value="5"
          oninput="rStep=clamp(+this.value,1,30);$('sl-ri').value=rStep">
        <span class="sunit">bpm</span>
      </div>
      <div class="srow">
        <span class="slbl">Meas / Step</span>
        <input type="range" id="sl-rm" min="1" max="32" value="4"
          oninput="rMeas=+this.value;$('num-rm').value=rMeas">
        <input type="number" id="num-rm" min="1" max="32" value="4"
          oninput="rMeas=clamp(+this.value,1,32);$('sl-rm').value=rMeas">
        <span class="sunit">meas</span>
      </div>
    </div>

    <div class="srow">
      <span class="slbl">Beats / Bar</span>
      <input type="range" id="sl-bm" min="1" max="8" value="4"
        oninput="setBpM(+this.value);$('num-bm').value=bpM">
      <input type="number" id="num-bm" min="1" max="8" value="4"
        oninput="setBpM(clamp(+this.value,1,8));$('sl-bm').value=bpM">
      <span class="sunit">beats</span>
    </div>

    <div id="beat-btns"></div>
  </div>

  <div class="panel" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
    <button id="btn-st" class="cb suc"  onclick="handleStartPause()">Start</button>
    <button id="btn-nx" class="cb suc"  onclick="handleNext()"        disabled>Next note</button>
    <button id="btn-sp" class="cb dan"  onclick="handleStop()"        disabled>Stop</button>
    <button id="btn-sv" class="cb suc"  onclick="handleSave()"        disabled>Save</button>
    <button id="btn-rs" class="cb neu"  onclick="handleReset()">Reset</button>
  </div>

  <div class="panel row">
    <span class="ptitle" style="flex-shrink:0;margin-right:4px">Did you survive?</span>
    <button id="rb-g" class="rbt g" onclick="setRating('great')">Whooohooo</button>
    <button id="rb-o" class="rbt o" onclick="setRating('ok')">OK</button>
    <button id="rb-r" class="rbt r" onclick="setRating('nah')">Nah</button>
    <span id="sess-cnt" style="margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:11px;color:#333"></span>
  </div>

  <div id="msg"></div>

</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const NS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NF=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const ST=['Major','Dominant 7th','Natural Minor','Harmonic Minor','Melodic Minor','Whole-Half','Half-Whole'];
const BCYC=['normal','accent','silent'];
const RLBL={great:'Whooohooo',ok:'OK',nah:'Nah'};
const RCOL={great:'FF006630',ok:'FFAA5500',nah:'FF991111'};

// ── Utils ──────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,isNaN(v)?a:v));

function fmtT(ms){
  const s=Math.floor(ms/1000);
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')+'.'+String(Math.floor((ms%1000)/10)).padStart(2,'0');
}
function tname(b){
  return b<60?'Largo':b<76?'Adagio':b<108?'Andante':b<120?'Moderato':b<156?'Allegro':b<176?'Vivace':b<200?'Presto':'Prestissimo';
}
function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
  return r;
}

// ── State ──────────────────────────────────────────────────────────────────
let status='idle', notes=[], noteIdx=0, accidental='sharp', scaleType='Major';
let elapsedMs=0, swTimer=null, swStartAt=0, swSaved=0, finalTime=0;
let metMode='static', sBpm=120, rStart=60, rEnd=160, rStep=5, rMeas=4, bpM=4;
let beatStates=['accent','normal','normal','normal'];
let actx=null, metRun=false, metTmr=null, metNext=0, metBeat=0, metMeasDone=0, metCurBpm=120;
let liveBpm=120, activeBeat=-1;
let rating=null, history=[];
let beatEls=[];

// ── Init ───────────────────────────────────────────────────────────────────
ST.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;$('sc-sel').appendChild(o);});
loadHist();
initBeatBtns();
updBpm();
updAll();

// ── Audio engine ───────────────────────────────────────────────────────────
function getCtx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function playClick(t,type){
  if(type==='silent') return;
  const ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = type==='accent' ? 1500 : 880;
  g.gain.setValueAtTime(type==='accent' ? 0.7 : 0.35, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.07);
  o.start(t); o.stop(t+0.09);
}
function runSched(){
  if(!metRun) return;
  const ctx=getCtx();
  while(metNext < ctx.currentTime+0.12){
    const b=metBeat;
    const bs=(b<beatStates.length)?beatStates[b]:'normal';
    playClick(metNext,bs);
    const d=Math.max(0,(metNext-ctx.currentTime)*1000);
    (function(cb,cd){setTimeout(()=>flashBeat(cb),cd);})(b,d);
    if(metMode==='static') metCurBpm=sBpm;
    metBeat=(b+1)%Math.max(1,bpM);
    metNext+=60/metCurBpm;
    if(metBeat===0 && metMode==='ramp'){
      metMeasDone++;
      if(metMeasDone>=rMeas){
        metMeasDone=0;
        if(metCurBpm<rEnd){
          metCurBpm=Math.min(metCurBpm+rStep,rEnd);
          const nb=Math.round(metCurBpm);
          (function(v,cd){setTimeout(()=>{liveBpm=v;updBpm();},cd);})(nb,d);
        }
      }
    }
  }
  metTmr=setTimeout(runSched,25);
}
function startMet(){
  metRun=true; metBeat=0; metMeasDone=0;
  metCurBpm=(metMode==='ramp')?rStart:sBpm;
  liveBpm=Math.round(metCurBpm); updBpm();
  const ctx=getCtx();
  metNext=ctx.currentTime+0.08;
  runSched();
}
function stopMet(){
  metRun=false; clearTimeout(metTmr);
  activeBeat=-1; refreshBtns();
}

// ── Stopwatch ──────────────────────────────────────────────────────────────
function startSW(){
  swStartAt=Date.now()-swSaved;
  swTimer=setInterval(()=>{elapsedMs=Date.now()-swStartAt; updSW();},50);
}
function pauseSW(){ clearInterval(swTimer); swSaved=Date.now()-swStartAt; }
function resetSW(){ clearInterval(swTimer); swSaved=0; elapsedMs=0; }

// ── Beat buttons ───────────────────────────────────────────────────────────
function initBeatBtns(){
  const c=$('beat-btns'); c.innerHTML=''; beatEls=[];
  for(let i=0;i<bpM;i++){
    const btn=document.createElement('button');
    btn.className='bbt';
    btn.innerHTML='<span class="bbn">'+(i+1)+'</span><span class="bbs"></span>';
    btn.addEventListener('click',(function(idx){return function(){cycleBeat(idx);};})(i));
    c.appendChild(btn); beatEls.push(btn);
  }
  refreshBtns();
}
function refreshBtns(){
  beatEls.forEach((btn,i)=>{
    if(i>=beatStates.length) return;
    const bs=beatStates[i];
    btn.dataset.s=bs; btn.dataset.a=(activeBeat===i)?'1':'0';
    btn.querySelector('.bbs').textContent=bs==='silent'?'−':bs==='accent'?'△':'●';
  });
}
function flashBeat(idx){ activeBeat=idx; refreshBtns(); setTimeout(()=>{activeBeat=-1;refreshBtns();},115); }
function cycleBeat(i){
  const c=BCYC.indexOf(beatStates[i]);
  beatStates[i]=BCYC[(c+1)%3]; refreshBtns();
}
function setBpM(v){
  v=clamp(v,1,8); bpM=v;
  const ns=Array(v).fill('normal'); ns[0]='accent';
  for(let i=1;i<Math.min(beatStates.length,v);i++) ns[i]=beatStates[i];
  beatStates=ns; initBeatBtns();
}

// ── UI updates ─────────────────────────────────────────────────────────────
function updBpm(){
  $('bpm-disp').textContent=Math.round(liveBpm);
  $('bpm-disp').className=(status==='running')?'run':'';
  $('tempo-nm').textContent=tname(liveBpm);
}
function updSW(){
  const sw=$('sw'), st=$('sw-st');
  sw.textContent=fmtT(elapsedMs);
  sw.className=(status==='running')?'run':(status==='paused')?'pau':'';
  st.textContent=(status==='completed')?('final: '+fmtT(finalTime)):(status==='paused')?'paused':(status==='running')?'running':'ready';
}
function updNote(){
  const n=(status!=='idle'&&notes.length)?notes[noteIdx]:'—';
  const noteEl=$('note');
  if(noteEl.textContent!==n && status!=='idle'){
    noteEl.textContent=n;
    noteEl.classList.remove('flash');
    void noteEl.offsetWidth;
    noteEl.classList.add('flash');
  } else {
    noteEl.textContent=n;
  }
  noteEl.className=(status!=='idle'?'act ':'')+(noteEl.className.includes('flash')?'flash':'');
  $('note-wrap').classList.toggle('act', status!=='idle');
  $('note-sc').textContent=scaleType;
  const p=$('prog'), pw=$('prog-wrap');
  p.textContent=(status==='idle')?'0/12':`${noteIdx+1}/12`;
  const done=(status==='completed');
  p.className=done?'done':(status!=='idle'?'act':'');
  pw.classList.toggle('done',done);
}
function updBtns(){
  const run=(status==='running'), pau=(status==='paused'), done=(status==='completed'), idle=(status==='idle');
  $('btn-st').textContent=run?'Pause':pau?'Resume':'Start';
  $('btn-st').className='cb '+(run?'war':pau?'suc':'suc');
  $('btn-nx').disabled=!run;
  $('btn-nx').textContent=(noteIdx===11&&run)?'Finish':'Next note';
  $('btn-sp').disabled=(idle);
  $('btn-sv').disabled=!done;
  $('btn-sv').classList.toggle('lit', done&&!!rating);
  updBpm();
}
function updAll(){ updSW(); updNote(); updBtns(); }

// ── Settings ───────────────────────────────────────────────────────────────
function setAcc(a){
  if(status!=='idle') return;
  accidental=a;
  $('ba-sh').className='acb'+(a==='sharp'?' on':'');
  $('ba-fl').className='acb'+(a==='flat'?' on':'');
}
function setMetMode(m){
  metMode=m;
  $('mb-st').classList.toggle('on',m==='static');
  $('mb-rp').classList.toggle('on',m==='ramp');
  $('ctrl-s').style.display=(m==='static')?'':'none';
  $('ctrl-r').style.display=(m==='ramp')?'':'none';
  liveBpm=(m==='static')?sBpm:rStart; updBpm();
}
function setRating(r){
  rating=r;
  $('rb-g').classList.toggle('on',r==='great');
  $('rb-o').classList.toggle('on',r==='ok');
  $('rb-r').classList.toggle('on',r==='nah');
  updBtns(); showMsg('');
}

// ── Session control ────────────────────────────────────────────────────────
function handleStartPause(){
  if(status==='idle'||status==='completed'){
    stopMet(); resetSW();
    notes=shuffle(accidental==='sharp'?NS:NF);
    noteIdx=0; rating=null;
    ['rb-g','rb-o','rb-r'].forEach(id=>$(id).classList.remove('on'));
    status='running'; showMsg(''); updAll();
    setTimeout(()=>{startSW();startMet();},55);
  } else if(status==='running'){
    status='paused'; pauseSW(); stopMet(); updAll();
    showMsg('Paused. Press Resume to continue.','i');
  } else if(status==='paused'){
    status='running'; showMsg(''); updAll();
    setTimeout(()=>{startSW();startMet();},40);
  }
}
function handleNext(){
  if(status!=='running') return;
  if(noteIdx<11){
    noteIdx++;
    updAll();
  } else {
    stopMet(); pauseSW();
    finalTime=Date.now()-swStartAt;
    status='completed'; updAll();
    showMsg('All 12 scales done! Rate your session below, then press Save.','i');
  }
}
function handleStop(){
  stopMet(); resetSW();
  status='idle'; notes=[]; noteIdx=0; finalTime=0;
  showMsg('Stopped.','i'); updAll();
}
function handleReset(){
  stopMet(); resetSW();
  status='idle'; notes=[]; noteIdx=0; finalTime=0; rating=null;
  ['rb-g','rb-o','rb-r'].forEach(id=>$(id).classList.remove('on'));
  showMsg(''); updAll();
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function showMsg(txt, cls){
  const m=$('msg');
  if(!txt){ m.className=''; m.textContent=''; return; }
  m.textContent=txt; m.className='show '+(cls||'i');
}

// ── Save / Export ──────────────────────────────────────────────────────────
async function handleSave(){
  if(status!=='completed') return;
  if(!rating){
    showMsg('Please rate your session ("Did you survive?") before saving!','w');
    return;
  }
  const t=finalTime||elapsedMs;
  const entry={
    date: new Date().toLocaleString('it-IT'),
    rating, scaleType, accidental, metMode,
    bpm: metMode==='static'?String(sBpm):`${rStart}→${rEnd}`,
    increment: metMode==='ramp'?String(rStep):'—',
    measPerStep: metMode==='ramp'?String(rMeas):'—',
    beatsPerBar: String(bpM),
    time: fmtT(t), timeMs: t
  };
  const newH=[...history,entry];
  history=newH;
  try{ localStorage.setItem('ss_history',JSON.stringify(newH)); }catch(e){}
  $('sess-cnt').textContent=newH.length+' session'+(newH.length>1?'s':'');
  showMsg('Generating Excel file…','i');

  try{
    const ExcelJS=await loadXL();
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet('Scale Suicide Log',{views:[{state:'frozen',ySplit:1}]});
    ws.columns=[
      {header:'Rating',     key:'rating',      width:16},
      {header:'Date',       key:'date',         width:22},
      {header:'Scale',      key:'scaleType',    width:18},
      {header:'Accidentals',key:'accidental',   width:14},
      {header:'Metro Mode', key:'metMode',      width:12},
      {header:'BPM',        key:'bpm',          width:14},
      {header:'Increment',  key:'increment',    width:12},
      {header:'Meas/Step',  key:'measPerStep',  width:12},
      {header:'Beats/Bar',  key:'beatsPerBar',  width:12},
      {header:'Time',       key:'time',         width:12},
      {header:'Time (ms)',  key:'timeMs',       width:12}
    ];
    ws.getRow(1).eachCell(c=>{
      c.font={bold:true,color:{argb:'FFFFFFFF'}};
      c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF111111'}};
      c.alignment={horizontal:'center'};
    });
    newH.forEach(e=>{
      const row=ws.addRow({...e, rating:RLBL[e.rating]||e.rating});
      const c1=row.getCell(1);
      c1.fill={type:'pattern',pattern:'solid',fgColor:{argb:RCOL[e.rating]||'FF333333'}};
      c1.font={bold:true,color:{argb:'FFFFFFFF'}};
      c1.alignment={horizontal:'center'};
    });
    const buf=await wb.xlsx.writeBuffer();
    dlBlob(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),'scale_suicide_log.xlsx');
    showMsg('Saved! '+newH.length+' session'+(newH.length>1?'s':'')+' logged. File "scale_suicide_log.xlsx" downloaded.','s');
  }catch(err){
    const hdr='Rating,Date,Scale,Accidentals,Metro Mode,BPM,Increment,Meas/Step,Beats/Bar,Time,Time(ms)';
    const rows=newH.map(e=>[RLBL[e.rating]||e.rating,e.date,e.scaleType,e.accidental,e.metMode,e.bpm,e.increment,e.measPerStep,e.beatsPerBar,e.time,e.timeMs].join(','));
    dlBlob(new Blob([[hdr,...rows].join('\n')],{type:'text/csv'}),'scale_suicide_log.csv');
    showMsg('Saved! '+newH.length+' session'+(newH.length>1?'s':'')+' logged. Downloaded as CSV (Excel CDN not available).','s');
  }
}

function dlBlob(blob,name){
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
function loadXL(){
  return new Promise((res,rej)=>{
    if(window.ExcelJS) return res(window.ExcelJS);
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js';
    s.onload=()=>window.ExcelJS?res(window.ExcelJS):rej(new Error('Not found'));
    s.onerror=()=>rej(new Error('Load failed'));
    document.head.appendChild(s);
  });
}

function loadHist(){
  try{
    const d=localStorage.getItem('ss_history');
    if(d){ history=JSON.parse(d); $('sess-cnt').textContent=history.length+' session'+(history.length>1?'s':''); }
  }catch(e){}
}
</script>
